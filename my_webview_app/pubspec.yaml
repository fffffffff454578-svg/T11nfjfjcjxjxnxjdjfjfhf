name: Absher
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # নতুন প্যাকেজসমূহ যোগ করা হলো
  flutter_inappwebview: ^6.0.0
  shared_preferences: ^2.3.0
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # আইকন জেনারেট করার জন্য প্যাকেজ
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true

# আইকন কনফিগারেশন
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21