<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absher Login</title>
    
    <!-- Supabase JavaScript Library (v2) - only once -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- bcryptjs for password checking -->
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* লাইট মোড ব্যাকগ্রাউন্ড */
        body.light-mode {
            background-color: #f5f6f8;
            color: #000000;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            padding: 16px 24px 24px 24px;
            position: relative;
            min-height: 100vh; /* পুরো স্ক্রিন জুড়ে রাখার জন্য */
        }

        /* টপ নেভিগেশন (ব্যাক বাটন) */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn svg {
            width: 26px;
            height: 26px;
            color: #0c4d34;
        }

        /* ইংরেজি মোডে ব্যাক বাটনের দিক পরিবর্তন */
        body.en-mode .back-btn svg {
            transform: scaleX(-1);
        }

        /* লোগো এরিয়া */
        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            margin-top: 0px;
        }

        .main-logo {
            width: 125px;
            height: auto;
            object-fit: contain;
        }

        /* পেজ টাইটেল */
        .page-title {
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: #ffffff;
            letter-spacing: -0.5px;
        }
        body.light-mode .page-title {
            color: #111111;
        }

        /* কন্টেন্ট সেকশন ডিসপ্লে লজিক */
        .form-section { 
            display: flex; 
            flex-direction: column;
            flex: 1; /* বাটনগুলোকে নিচে পুশ করার ম্যাজিক */
        }
        .forgot-section { display: none; flex: 1; flex-direction: column; }
        .otp-section { display: none; flex: 1; flex-direction: column; }
        .reset-pass-section { display: none; flex: 1; flex-direction: column; }

        /* ফর্ম ইনপুট সেকশন (স্ক্রিনশটের মতো পারফেক্ট চিকন করার লজিক) */
        .form-group {
            position: relative;
            margin-bottom: 10px;
            width: 100%;
        }

        .form-group input {
            width: 100%;
            padding: 10px 10px 3px 10px; /* প্যাডিং কমিয়ে চিকন করা হয়েছে */
            font-size: 16px;
            border: 1px solid #333333;
            border-radius: 12px;
            background-color: #1e2124;
            color: #ffffff;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            text-align: inherit;
            height: 50px; /* ফিক্সড স্ট্যান্ডার্ড স্লিম হাইট */
        }

        body.light-mode .form-group input {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            color: #000000;
        }

        .form-group input:focus {
            border-color: #72a99a;
            box-shadow: 0 0 0 1px rgba(114, 169, 154, 0.2);
        }
        body.light-mode .form-group input:focus {
            border-color: #0c4d34;
            box-shadow: 0 0 0 1px rgba(12, 77, 52, 0.15);
        }

        /* ফ্লোটিং লেবেল */
        .form-group label {
            position: absolute;
            top: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #888888;
            pointer-events: none;
        }

        html[dir="rtl"] .form-group label { right: 16px; left: auto; }
        html[dir="ltr"] .form-group label { left: 16px; right: auto; }

        /* কিপ মি লগড ইন */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 05px;
            margin-bottom: 05px;
            cursor: pointer;
            font-size: 15px;
            color: #888888;
            user-select: none;
            width: fit-content;
        }

        html[dir="rtl"] .checkbox-container { float: right; }
        html[dir="ltr"] .checkbox-container { float: left; }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 1px solid #555555;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body.light-mode .custom-checkbox { border-color: #cbd5e1; }

        .checkbox-container input { display: none; }
        .checkbox-container input:checked + .custom-checkbox {
            background-color: #0c4d34;
            border-color: #0c4d34;
        }
        .checkbox-container input:checked + .custom-checkbox::after {
            content: '✓';
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
        }

        /* ইনফো নোটিউট */
        .info-notice {
            display: flex;
            gap: 10px;
            margin-top: 05px;
            margin-bottom: 05px;
            clear: both;
            align-items: flex-start;
        }

        .info-icon svg {
            width: 16px;
            height: 16px;
            color: #1565c0;
            margin-top: 2px;
        }

        .info-text {
            font-size: 13px;
            color: #888888;
            line-height: 1.4;
        }

        /* স্পেসার - যা টেক্সট এবং বাটনের মাঝে বিশাল গ্যাপ বা খালি জায়গা তৈরি করবে */
        .spacer {
            flex-grow: 1; 
        }

        /* সাবমিট লগইন বাটন ডিফল্ট কন্ডিশন (ম্লান সবুজ ও নন-ক্লিকেবল) */
        .submit-btn {
            background-color: #749f91; 
            color: #ffffff;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            cursor: not-allowed;
            transition: background-color 0.25s ease;
            margin-bottom: 20px;
            opacity: 0.8;
            height: 52px;
        }

        /* কন্ডিশন ম্যাচ হলে একটিভ ক্লাস (গাঢ় সবুজ ও ক্লিকেবল) */
        .submit-btn.active {
            background-color: #0c4d34;
            cursor: pointer;
            opacity: 1;
        }

        /* ফরগেট পাসওয়ার্ড লিংক */
        .forgot-link-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .forgot-link {
            color: #0c4d34;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        /* ওটিপি ইনপুট ফিল্ড কন্টেইনার */
        .otp-input-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
            direction: ltr;
        }

        .otp-box {
            width: 50px;
            height: 50px;
            border: 1px solid #333333;
            border-radius: 12px;
            background-color: #1e2124;
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            outline: none;
        }
        body.light-mode .otp-box {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            color: #000000;
        }
        .otp-box:focus {
            border-color: #0c4d34;
        }

        /* ওটিপি অটো ভেরিফিকেশন পপআপ ডায়ালগ */
        .otp-dialog {
            background-color: #22252a;
            border-radius: 20px;
            padding: 20px;
            margin-top: 25px;
            border: 1px solid #333333;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        body.light-mode .otp-dialog {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }

        .otp-dialog-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .otp-dialog-msg {
            font-size: 13px;
            color: #888888;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .otp-dialog-btn {
            background-color: #0c4d34;
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <div class="top-nav">
            <button class="back-btn" id="backToHomeBtn" title="Back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
        </div>

        <div class="logo-container">
            <img src="All_image/white_absher_logo.png" alt="Absher Logo" class="main-logo" id="loginPageLogo">
        </div>

        <div class="form-section" id="mainFormSection">
            <div class="page-title" id="pageTitleText">تسجيل الدخول إلى أبشر</div>
            
            <form id="loginForm" onsubmit="event.preventDefault();" style="display: contents;">
                <div class="form-group">
                    <label id="userLabel">اسم المستخدم أو رقم الهوية</label>
                    <input type="text" id="usernameInput" placeholder="" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label id="passLabel">كلمة المرور</label>
                    <input type="password" id="passwordInput" placeholder="" required>
                </div>

                <div>
                    <label class="checkbox-container">
                        <input type="checkbox" id="keepLoggedInCheckbox">
                        <div class="custom-checkbox"></div>
                        <span id="keepLoginText">عدم تسجيل الخروج</span>
                    </label>
                </div>

                <div class="info-notice">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </div>
                    <div class="info-text" id="infoNoticeText">
                        فعل قفل التطبيق من خلال الإعدادات على هاتفك لتتمكن من تفعيل هذا الخيار
                    </div>
                </div>

                <div class="spacer"></div>

                <button type="submit" class="submit-btn" id="submitLoginBtn" disabled>تسجيل الدخول</button>
            </form>

            <div class="forgot-link-container">
                <a href="#" class="forgot-link" id="forgotPasswordLink">نسيت كلمة المرور</a>
            </div>
        </div>

        <div class="forgot-section" id="forgotPasswordSection">
            <div class="page-title" id="forgotTitleText">إعادة تعيين كلمة المرور</div>
            
            <form id="forgotForm" onsubmit="event.preventDefault();" style="display: contents;">
                <div class="form-group">
                    <label id="forgotUserLabel">رقم الهوية</label>
                    <input type="text" id="forgotIdInput" placeholder="" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label id="forgotMobileLabel">رقم الهاتف المحمول</label>
                    <input type="text" id="forgotMobileInput" placeholder="" required autocomplete="off">
                </div>

                <div class="spacer"></div>

                <button type="submit" class="submit-btn active" id="submitForgotBtn">إرسال</button>
            </form>

            <div class="forgot-link-container">
                <a href="#" class="forgot-link" id="backToLoginLink">العودة لتسجيل الدخول</a>
            </div>
        </div>

        <div class="otp-section" id="otpVerificationSection">
            <div class="page-title" id="otpTitleText">رمز التحقق</div>
            
            <div class="otp-input-container">
                <input type="text" class="otp-box" maxlength="1">
                <input type="text" class="otp-box" maxlength="1">
                <input type="text" class="otp-box" maxlength="1">
                <input type="text" class="otp-box" maxlength="1">
            </div>

            <div class="otp-dialog">
                <div class="otp-dialog-title" id="otpDialogTitleText">السماح لـ أبشر بقراءة الرسالة؟</div>
                <div class="otp-dialog-msg" id="otpDialogMsgText">سيقوم التطبيق تلقائيًا بالتعرف على رمز التحقق المرسل إلى هاتفك.</div>
                <button class="otp-dialog-btn" id="otpAllowBtn">Allow / سماح</button>
            </div>
            
            <div class="spacer"></div>
        </div>

        <div class="reset-pass-section" id="resetPasswordSection">
            <div class="page-title" id="resetTitleText">إنشاء كلمة مرور جديدة</div>
            
            <form id="resetPassForm" onsubmit="event.preventDefault();" style="display: contents;">
                <div class="form-group">
                    <label id="newPassLabel">كلمة المرور الجديدة</label>
                    <input type="password" id="newPasswordInput" placeholder="" required>
                </div>

                <div class="form-group">
                    <label id="confPassLabel">تأكيد كلمة المرور</label>
                    <input type="password" id="confirmPasswordInput" placeholder="" required>
                </div>

                <div class="spacer"></div>

                <button type="submit" class="submit-btn active" id="submitResetBtn">تحديث كلمة المرور</button>
            </form>
        </div>

    </div>

    <script>
        // ==================== Supabase Configuration ====================
        const SUPABASE_URL = 'https://xbnvnfzibxjjfaqheonc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhibnZuZnppYnhqamZhcWhlb25jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzc5MDMsImV4cCI6MjA5Njc1MzkwM30.bgTc6vfNKL2IRxh6eM3UmBamyKMuQabfPpOlXVyZLLY';
        // ✅ client variable renamed to supabaseClient
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==================== UI Elements ====================
        const loginPageLogo = document.getElementById('loginPageLogo');
        const backToHomeBtn = document.getElementById('backToHomeBtn');
        
        const mainFormSection = document.getElementById('mainFormSection');
        const forgotPasswordSection = document.getElementById('forgotPasswordSection');
        const otpVerificationSection = document.getElementById('otpVerificationSection');
        const resetPasswordSection = document.getElementById('resetPasswordSection');

        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const submitLoginBtn = document.getElementById('submitLoginBtn');

        // ==================== Language Data ====================
        const loginTranslations = {
            ar: {
                title: "تسجيل الدخول إلى أبشر",
                userLabel: "اسم المستخدم أو رقم الهوية",
                passLabel: "كلمة المرور",
                keepLogin: "عدم تسجيل الخروج",
                info: "فعل قفل التطبيق من خلال الإعدادات على هاتفك لتتمكن من تفعيل هذا الخيار",
                btnText: "تسجيل الدخول",
                forgot: "نسيت كلمة المرور",
                forgotTitle: "إعادة تعيين كلمة المرور",
                forgotUser: "رقم الهوية",
                forgotMobile: "رقم الهاتف المحمول",
                forgotBtn: "إرسال",
                backLogin: "العودة لتسجيل الدخول",
                userInputPlace: "أدخل اسم المستخدم أو رقم الهوية",
                passInputPlace: "أدخل كلمة المرور",
                forgotIdPlace: "أدخل رقم الهوية",
                forgotMobilePlace: "أدخل رقم الهاتف المحمول",
                otpTitle: "رمز التحقق",
                otpDialogTitle: "السماح لـ أبشر بقراءة الرسالة؟",
                otpDialogMsg: "سيقوم التطبيق تلقائيًا بالتعرف على رمز التحقق المرسل إلى هاتفك.",
                resetTitle: "إنشاء كلمة مرور جديدة",
                newPassLabel: "كلمة المرور الجديدة",
                confPassLabel: "تأكيد كلمة المرور",
                newPassPlace: "أدخل كلمة المرور الجديدة",
                confPassPlace: "أدخل تأكيد كلمة المرور",
                resetBtn: "تحديث كلمة المرور",
                loginSuccess: "تم تسجيل الدخول بنجاح",
                loginFailed: "فشل تسجيل الدخول، يرجى التحقق من البيانات",
                banned: "تم حظر حسابك. يرجى الاتصال بالمسؤول."
            },
            en: {
                title: "Log In to Absher",
                userLabel: "Username or ID Number",
                passLabel: "Password",
                keepLogin: "Keep me logged in",
                info: "Enable biometrics use on your Settings to be able to check the option to stay logged in",
                btnText: "Log In",
                forgot: "Forgot Password",
                forgotTitle: "Reset Password",
                forgotUser: "ID Number",
                forgotMobile: "Mobile Number",
                forgotBtn: "Submit",
                backLogin: "Back to Log In",
                userInputPlace: "Enter Username or ID Number",
                passInputPlace: "Enter Password",
                forgotIdPlace: "Enter ID Number",
                forgotMobilePlace: "Enter Mobile Number",
                otpTitle: "Verification Code",
                otpDialogTitle: "Allow Absher to read the message?",
                otpDialogMsg: "The application will automatically recognize the verification code sent to your phone.",
                resetTitle: "Create New Password",
                newPassLabel: "New Password",
                confPassLabel: "Confirm Password",
                newPassPlace: "Enter New Password",
                confPassPlace: "Enter Confirm Password",
                resetBtn: "Update Password",
                loginSuccess: "Login successful!",
                loginFailed: "Login failed, please check your credentials.",
                banned: "Your account has been banned. Please contact the administrator."
            }
        };

        // ==================== Validation ====================
        function validateLoginForm() {
            const userValue = usernameInput.value.trim();
            const passValue = passwordInput.value.trim();

            if (userValue.length >= 9 && passValue.length > 0) {
                submitLoginBtn.classList.add('active');
                submitLoginBtn.disabled = false;
            } else {
                submitLoginBtn.classList.remove('active');
                submitLoginBtn.disabled = true;
            }
        }

        usernameInput.addEventListener('input', validateLoginForm);
        passwordInput.addEventListener('input', validateLoginForm);

        // ==================== Theme & Language Sync ====================
        function syncTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                loginPageLogo.src = 'All_image/green_absher_logo.png';
            } else {
                document.body.classList.remove('light-mode');
                loginPageLogo.src = 'All_image/white_absher_logo.png';
            }
        }

        function syncLanguage() {
            const savedLang = localStorage.getItem('language') || 'ar';
            const data = loginTranslations[savedLang];
            const htmlTag = document.documentElement;

            if (savedLang === 'en') {
                htmlTag.setAttribute('lang', 'en');
                htmlTag.setAttribute('dir', 'ltr');
                document.body.classList.add('en-mode');
            } else {
                htmlTag.setAttribute('lang', 'ar');
                htmlTag.setAttribute('dir', 'rtl');
                document.body.classList.remove('en-mode');
            }

            // Update all texts
            document.getElementById('pageTitleText').textContent = data.title;
            document.getElementById('userLabel').textContent = data.userLabel;
            document.getElementById('passLabel').textContent = data.passLabel;
            document.getElementById('keepLoginText').textContent = data.keepLogin;
            document.getElementById('infoNoticeText').textContent = data.info;
            document.getElementById('submitLoginBtn').textContent = data.btnText;
            document.getElementById('forgotPasswordLink').textContent = data.forgot;

            document.getElementById('forgotTitleText').textContent = data.forgotTitle;
            document.getElementById('forgotUserLabel').textContent = data.forgotUser;
            document.getElementById('forgotMobileLabel').textContent = data.forgotMobile;
            document.getElementById('submitForgotBtn').textContent = data.forgotBtn;
            document.getElementById('backToLoginLink').textContent = data.backLogin;

            document.getElementById('otpTitleText').textContent = data.otpTitle;
            document.getElementById('otpDialogTitleText').textContent = data.otpDialogTitle;
            document.getElementById('otpDialogMsgText').textContent = data.otpDialogMsg;

            document.getElementById('resetTitleText').textContent = data.resetTitle;
            document.getElementById('newPassLabel').textContent = data.newPassLabel;
            document.getElementById('confPassLabel').textContent = data.confPassLabel;
            document.getElementById('submitResetBtn').textContent = data.resetBtn;

            // Placeholders
            document.getElementById('usernameInput').placeholder = data.userInputPlace;
            document.getElementById('passwordInput').placeholder = data.passInputPlace;
            document.getElementById('forgotIdInput').placeholder = data.forgotIdPlace;
            document.getElementById('forgotMobileInput').placeholder = data.forgotMobilePlace;
            document.getElementById('newPasswordInput').placeholder = data.newPassPlace;
            document.getElementById('confirmPasswordInput').placeholder = data.confPassPlace;
        }

        syncTheme();
        syncLanguage();

        // ==================== Login Attempt Logging ====================
        async function logLoginAttempt(iqama, success) {
            try {
                await supabaseClient.from('abs_login_attempts').insert({
                    iqama_attempt: iqama,
                    success: success,
                    attempted_at: new Date().toISOString()
                });
            } catch (e) {
                console.error('Failed to log login attempt:', e);
            }
        }

        // ==================== Login Form Submission (CUSTOM BCRYPT AUTH) ====================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const iqama = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const lang = localStorage.getItem('language') || 'ar';
            const t = loginTranslations[lang];

            // বাটন লোডিং স্টেট
            submitLoginBtn.disabled = true;
            submitLoginBtn.textContent = lang === 'ar' ? 'جارٍ تسجيل الدخول...' : 'Logging in...';

            // সরাসরি abs_users টেবিল থেকে ইউজার খোঁজা (Supabase Auth নয়)
            const { data: user, error } = await supabaseClient
                .from('abs_users')
                .select('*')
                .eq('iqama', iqama)
                .maybeSingle();

            // ইউজার না পাওয়া গেলে বা কোনো এরর হলে
            if (error || !user) {
                await logLoginAttempt(iqama, false);
                alert(t.loginFailed);
                submitLoginBtn.disabled = false;
                submitLoginBtn.textContent = t.btnText;
                validateLoginForm();
                return;
            }

            // ব্যান চেক
            if (user.is_banned) {
                await logLoginAttempt(iqama, false);
                alert(t.banned);
                submitLoginBtn.disabled = false;
                submitLoginBtn.textContent = t.btnText;
                validateLoginForm();
                return;
            }

            // পাসওয়ার্ড হ্যাশ চেক
            if (!user.password_hash) {
                await logLoginAttempt(iqama, false);
                alert(t.loginFailed);
                submitLoginBtn.disabled = false;
                submitLoginBtn.textContent = t.btnText;
                validateLoginForm();
                return;
            }

            // bcrypt compare
            const match = dcodeIO.bcrypt.compareSync(password, user.password_hash);
            if (!match) {
                await logLoginAttempt(iqama, false);
                alert(t.loginFailed);
                submitLoginBtn.disabled = false;
                submitLoginBtn.textContent = t.btnText;
                validateLoginForm();
                return;
            }

            // সব ঠিক থাকলে
            await logLoginAttempt(iqama, true);
            localStorage.setItem('user_iqama', iqama);
            alert(t.loginSuccess);
            // 👇 এই নতুন ২ লাইন কোড এখানে বসাও
            if (window.BiometricChannel) {
                window.BiometricChannel.postMessage('setup_biometric');
            }
            window.location.href = 'dashboard.html';
        });

        // ==================== Forgot Password Flow ====================
        document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
            e.preventDefault();
            mainFormSection.style.display = 'none';
            forgotPasswordSection.style.display = 'flex';
        });

        document.getElementById('backToLoginLink').addEventListener('click', function(e) {
            e.preventDefault();
            forgotPasswordSection.style.display = 'none';
            mainFormSection.style.display = 'flex';
        });

        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const lang = localStorage.getItem('language') || 'ar';
            alert(lang === 'ar' ? 'رمز التحقق هو: 4921 (محاكاة)' : 'Verification code is: 4921 (simulated)');
            forgotPasswordSection.style.display = 'none';
            otpVerificationSection.style.display = 'flex';
        });

        document.getElementById('otpAllowBtn').addEventListener('click', function() {
            const boxes = document.querySelectorAll('.otp-box');
            const mockOtp = ["4", "9", "2", "1"];
            boxes.forEach((box, idx) => {
                box.value = mockOtp[idx];
            });

            setTimeout(() => {
                otpVerificationSection.style.display = 'none';
                resetPasswordSection.style.display = 'flex';
            }, 1000);
        });

        document.getElementById('resetPassForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const lang = localStorage.getItem('language') || 'ar';
            alert(lang === 'ar' ? 'تم تحديث كلمة المرور بنجاح!' : 'Password updated successfully!');
            window.location.href = 'login.html';
        });

        // ==================== Back Button Logic ====================
        backToHomeBtn.addEventListener('click', function() {
            if (forgotPasswordSection.style.display === 'flex') {
                forgotPasswordSection.style.display = 'none';
                mainFormSection.style.display = 'flex';
            } else if (otpVerificationSection.style.display === 'flex') {
                otpVerificationSection.style.display = 'none';
                forgotPasswordSection.style.display = 'flex';
            } else if (resetPasswordSection.style.display === 'flex') {
                resetPasswordSection.style.display = 'none';
                forgotPasswordSection.style.display = 'flex';
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
